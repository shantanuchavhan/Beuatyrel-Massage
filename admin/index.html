<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Embroidery - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fef5f8 0%, #fff0f5 100%);
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .admin-sidebar {
            width: 280px;
            background: linear-gradient(135deg, #d45a7a, #b34262);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s;
        }

        .admin-logo {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .admin-logo h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
        }

        .admin-logo p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .admin-menu {
            padding: 30px 0;
        }

        .admin-menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .admin-menu-item:hover, .admin-menu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            padding-left: 35px;
        }

        .admin-menu-item i {
            width: 24px;
            font-size: 18px;
        }

        /* Main Content */
        .admin-main {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
        }

        .admin-header {
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .admin-header h1 {
            font-size: 24px;
            color: #b34262;
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-user span {
            color: #666;
        }

        .logout-btn {
            background: #d45a7a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #b34262;
        }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #d45a7a, #b34262);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .stat-info h3 {
            font-size: 28px;
            color: #b34262;
        }

        .stat-info p {
            color: #888;
            font-size: 14px;
        }

        /* Tables */
        .data-table {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: #fff5f8;
            color: #b34262;
            font-weight: 600;
        }

        .data-table tr:hover {
            background: #fef5f8;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete, .btn-view {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-edit {
            background: #4caf50;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-view {
            background: #2196f3;
            color: white;
        }

        .btn-add {
            background: linear-gradient(135deg, #d45a7a, #b34262);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #b34262;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #d45a7a, #b34262);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                left: -280px;
            }
            .admin-sidebar.active {
                left: 0;
            }
            .admin-main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar" id="sidebar">
            <div class="admin-logo">
                <h2><i class="fas fa-rose"></i> Rose Admin</h2>
                <p>Embroidery Management System</p>
            </div>
            <div class="admin-menu">
                <a href="#" class="admin-menu-item" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#" class="admin-menu-item" data-page="products">
                    <i class="fas fa-box"></i> Products
                </a>
                <a href="#" class="admin-menu-item" data-page="orders">
                    <i class="fas fa-shopping-cart"></i> Orders
                </a>
                <a href="#" class="admin-menu-item" data-page="users">
                    <i class="fas fa-users"></i> Users
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="admin-user">
                    <span><i class="fas fa-user"></i> Admin</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <div id="pageContent"></div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId" value="">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="prodCategory">
                        <option value="machine">Embroidery Machine</option>
                        <option value="device">Accessory & Device</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="prodPrice" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="prodImage">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prodDesc" required></textarea>
                </div>
                <div class="form-group">
                    <label>Specifications (comma separated)</label>
                    <input type="text" id="prodSpecs" placeholder="e.g., 12 Needles, 1000 SPM, USB">
                </div>
                <button type="submit" class="submit-btn">Save Product</button>
            </form>
        </div>
    </div>

    <script>
        // Initialize data from localStorage or default
        let products = JSON.parse(localStorage.getItem('rose_products')) || [
            { id: 1, name: "HSW 5G 1216", category: "machine", price: 325000, image: "https://www.singleheadembroidery.com/wp-content/uploads/2024/08/1216-1.jpg", description: "Compact powerhouse for home studios and small businesses.", specs: ["12x16\" Area", "12 Needles", "1000 SPM"], badge: "Compact Rose", bestSeller: true },
            { id: 2, name: "HSW 5G 1632", category: "machine", price: 410000, image: "https://www.singleheadembroidery.com/wp-content/uploads/2024/08/1632.jpg", description: "Industrial-grade machine with expanded workspace.", specs: ["16x32\" Area", "12 Needles", "Auto Trimmer"], badge: "Rose Performer", bestSeller: true },
            { id: 3, name: "Magnetic Hoop Pro", category: "device", price: 12500, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTR878VKlZXIT7rcGYXe1G2Thh8jUDWCyL7tw&s", description: "Advanced magnetic hooping eliminates fabric slipping.", specs: ["7 Sizes", "Quick-release", "No Hoop Burn"], badge: "Best Seller", bestSeller: true },
            { id: 4, name: "Smart Thread Manager", category: "device", price: 18500, image: "https://www.esewtech.com/comdata/74578/product/20240608164346A32780FB36B04DD0_b.png", description: "Real-time tension monitoring with mobile alerts.", specs: ["Mobile App", "Break Detection", "Predictive"], badge: "IoT", bestSeller: true }
        ];

        let orders = JSON.parse(localStorage.getItem('rose_orders')) || [];
        let users = JSON.parse(localStorage.getItem('rose_users')) || [
            { id: 1, name: "John Doe", email: "john@example.com", phone: "9876543210", orders: 2, total: 325000, status: "active", joined: "2024-01-15" },
            { id: 2, name: "Jane Smith", email: "jane@example.com", phone: "9876543211", orders: 1, total: 12500, status: "active", joined: "2024-02-20" }
        ];

        let nextProductId = products.length + 1;
        let nextOrderId = orders.length + 1;
        let nextUserId = users.length + 1;

        function saveToLocalStorage() {
            localStorage.setItem('rose_products', JSON.stringify(products));
            localStorage.setItem('rose_orders', JSON.stringify(orders));
            localStorage.setItem('rose_users', JSON.stringify(users));
        }

        function loadPage(page) {
            document.querySelectorAll('.admin-menu-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            
            const titles = {
                dashboard: 'Dashboard',
                products: 'Product Management',
                orders: 'Order Management',
                users: 'User Management'
            };
            document.getElementById('pageTitle').innerText = titles[page];
            
            if (page === 'dashboard') renderDashboard();
            else if (page === 'products') renderProducts();
            else if (page === 'orders') renderOrders();
            else if (page === 'users') renderUsers();
        }

        function renderDashboard() {
            const totalProducts = products.length;
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
            const totalUsers = users.length;
            
            document.getElementById('pageContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-info">
                            <h3>${totalProducts}</h3>
                            <p>Total Products</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-info">
                            <h3>${totalOrders}</h3>
                            <p>Total Orders</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-info">
                            <h3>₹${(totalRevenue).toLocaleString()}</h3>
                            <p>Total Revenue</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h3>${totalUsers}</h3>
                            <p>Registered Users</p>
                        </div>
                    </div>
                </div>
                <div class="data-table">
                    <h3 style="padding: 20px 20px 0;">Recent Orders</h3>
                    <table>
                        <thead>
                            <tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr>
                        </thead>
                        <tbody>
                            ${orders.slice(0, 5).map(order => `
                                <tr>
                                    <td>#${order.id}</td>
                                    <td>${order.customer}</td>
                                    <td>₹${order.total.toLocaleString()}</td>
                                    <td><span style="background:#4caf50; color:white; padding:4px 12px; border-radius:20px; font-size:12px;">${order.status}</span></td>
                                    <td>${order.date}</td>
                                </tr>
                            `).join('')}
                            ${orders.length === 0 ? '<tr><td colspan="5" style="text-align:center;">No orders yet</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderProducts() {
            document.getElementById('pageContent').innerHTML = `
                <button class="btn-add" onclick="openAddModal()"><i class="fas fa-plus"></i> Add New Product</button>
                <div class="data-table">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${products.map(product => `
                                <tr>
                                    <td>${product.id}</td>
                                    <td><img src="${product.image}" style="width:50px; height:50px; object-fit:cover; border-radius:10px;"></td>
                                    <td>${product.name}</td>
                                    <td>${product.category === 'machine' ? '🪡 Machine' : '🔧 Device'}</td>
                                    <td>₹${product.price.toLocaleString()}</td>
                                    <td class="action-buttons">
                                        <button class="btn-edit" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i> Edit</button>
                                        <button class="btn-delete" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i> Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderOrders() {
            document.getElementById('pageContent').innerHTML = `
                <div class="data-table">
                    <table>
                        <thead>
                            <tr><th>Order ID</th><th>Customer</th><th>Email</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            ${orders.map(order => `
                                <tr>
                                    <td>#${order.id}</td>
                                    <td>${order.customer}</td>
                                    <td>${order.email}</td>
                                    <td>${order.items}</td>
                                    <td>₹${order.total.toLocaleString()}</td>
                                    <td>
                                        <select onchange="updateOrderStatus(${order.id}, this.value)" style="padding:5px 10px; border-radius:20px;">
                                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                            <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                            <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                            <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                        </select>
                                    </td>
                                    <td>${order.date}</td>
                                    <td><button class="btn-view" onclick="viewOrder(${order.id})"><i class="fas fa-eye"></i> View</button></td>
                                </tr>
                            `).join('')}
                            ${orders.length === 0 ? '<tr><td colspan="8" style="text-align:center;">No orders yet</td></tr>' : ''}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderUsers() {
            document.getElementById('pageContent').innerHTML = `
                <div class="data-table">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th><th>Status</th><th>Joined</th></tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>${user.id}</td>
                                    <td>${user.name}</td>
                                    <td>${user.email}</td>
                                    <td>${user.phone}</td>
                                    <td>${user.orders}</td>
                                    <td>₹${user.total.toLocaleString()}</td>
                                    <td><span style="background:#4caf50; color:white; padding:4px 12px; border-radius:20px; font-size:12px;">${user.status}</span></td>
                                    <td>${user.joined}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').style.display = 'flex';
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                document.getElementById('modalTitle').innerText = 'Edit Product';
                document.getElementById('productId').value = product.id;
                document.getElementById('prodName').value = product.name;
                document.getElementById('prodCategory').value = product.category;
                document.getElementById('prodPrice').value = product.price;
                document.getElementById('prodImage').value = product.image;
                document.getElementById('prodDesc').value = product.description;
                document.getElementById('prodSpecs').value = product.specs.join(', ');
                document.getElementById('productModal').style.display = 'flex';
            }
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== id);
                saveToLocalStorage();
                renderProducts();
            }
        }

        function updateOrderStatus(id, status) {
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = status;
                saveToLocalStorage();
                renderOrders();
            }
        }

        function viewOrder(id) {
            const order = orders.find(o => o.id === id);
            alert(`Order #${order.id}\nCustomer: ${order.customer}\nItems: ${order.items}\nTotal: ₹${order.total.toLocaleString()}\nStatus: ${order.status}`);
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('productId').value);
            const product = {
                id: id || nextProductId++,
                name: document.getElementById('prodName').value,
                category: document.getElementById('prodCategory').value,
                price: parseInt(document.getElementById('prodPrice').value),
                image: document.getElementById('prodImage').value,
                description: document.getElementById('prodDesc').value,
                specs: document.getElementById('prodSpecs').value.split(',').map(s => s.trim()),
                badge: "Premium",
                bestSeller: false
            };
            
            if (id) {
                const index = products.findIndex(p => p.id === id);
                products[index] = product;
            } else {
                products.push(product);
            }
            saveToLocalStorage();
            closeModal();
            renderProducts();
        });

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        function checkAuth() {
            if (!localStorage.getItem('admin_logged_in')) {
                window.location.href = 'login.html';
            }
        }

        document.querySelectorAll('.admin-menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                loadPage(item.dataset.page);
            });
        });

        checkAuth();
        loadPage('dashboard');
        window.openAddModal = openAddModal;
        window.editProduct = editProduct;
        window.deleteProduct = deleteProduct;
        window.updateOrderStatus = updateOrderStatus;
        window.viewOrder = viewOrder;
        window.closeModal = closeModal;
        window.logout = logout;
    </script>
</body>
</html>
